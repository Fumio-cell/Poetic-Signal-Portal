<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- SpectraLine: Frequency spectrum bars with a drawn curve -->
  <!-- Spectrum bars -->
  <line x1="10" y1="38" x2="10" y2="28" stroke="#7c5cfc" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="38" x2="16" y2="22" stroke="#7c5cfc" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="38" x2="22" y2="14" stroke="#7c5cfc" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="28" y1="38" x2="28" y2="18" stroke="#7c5cfc" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="34" y1="38" x2="34" y2="24" stroke="#7c5cfc" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="40" y1="38" x2="40" y2="30" stroke="#7c5cfc" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Hand-drawn sculpting curve -->
  <path d="M8 30 Q14 20 20 12 Q26 18 32 16 Q38 22 42 28" stroke="#5ce0fc" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="0"/>
  <!-- Pencil/pen tip -->
  <circle cx="42" cy="28" r="2" fill="#5ce0fc" opacity="0.6"/>
</svg>
