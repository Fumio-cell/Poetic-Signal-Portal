<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Luma2MIDI: Prism splitting light into MIDI signals -->
  <!-- Prism/Diamond -->
  <path d="M24 8 L36 24 L24 40 L12 24 Z" stroke="#7c5cfc" stroke-width="1.5" fill="none" opacity="0.9"/>
  <!-- Light ray entering -->
  <line x1="4" y1="20" x2="12" y2="24" stroke="#5ce0fc" stroke-width="1.2" opacity="0.6"/>
  <!-- Refracted signals (MIDI) -->
  <line x1="36" y1="24" x2="44" y2="16" stroke="#7c5cfc" stroke-width="1.2" opacity="0.7"/>
  <line x1="36" y1="24" x2="44" y2="24" stroke="#9b7dff" stroke-width="1.2" opacity="0.5"/>
  <line x1="36" y1="24" x2="44" y2="32" stroke="#5ce0fc" stroke-width="1.2" opacity="0.7"/>
  <!-- Musical note dots -->
  <circle cx="44" cy="16" r="2" fill="#7c5cfc" opacity="0.8"/>
  <circle cx="44" cy="32" r="2" fill="#5ce0fc" opacity="0.8"/>
  <!-- Inner glow -->
  <circle cx="24" cy="24" r="4" fill="#7c5cfc" opacity="0.15"/>
</svg>
